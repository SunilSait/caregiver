<!DOCTYPE html>
<html lang="en" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Something amazing is coming soon from TenderCare. Stay tuned for new features and services for families.">
    <title>Coming Soon | TenderCare</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="tailwind-config.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 font-body min-h-screen flex flex-col">

<!-- Header (Logo & Toggles) -->
<header class="w-full bg-transparent px-4 sm:px-8 py-6 flex items-center justify-between z-50 relative">
    <a href="index.html" class="flex items-center space-x-2.5 group">
        <img src="assets/logo.png" alt="TenderCare Logo" class="h-8 w-8 object-contain rounded-lg shadow-sm border border-gray-150/10 dark:border-gray-800/10 transition-transform group-hover:scale-105 duration-350">
        <span class="font-black text-xl tracking-tight text-rose-700 dark:text-rose-500 group-hover:text-rose-600 transition-colors" style="font-family: 'DM Serif Display', serif;">TenderCare</span>
    </a>
    <div class="flex items-center gap-1.5">
        <button class="js-dir-toggle w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100/50 hover:bg-gray-100 dark:bg-gray-800/50 dark:hover:bg-gray-800 border border-gray-200/20 dark:border-gray-700/50 text-gray-800 dark:text-white transition-all text-[8px] font-black uppercase" aria-label="Toggle text direction"><span>LTR</span></button>
        <button class="js-theme-toggle w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100/50 hover:bg-gray-100 dark:bg-gray-800/50 dark:hover:bg-gray-800 border border-gray-200/20 dark:border-gray-700/50 text-gray-800 dark:text-white transition-all" aria-label="Toggle theme"><i class="fas fa-moon text-[10px]"></i></button>
    </div>
</header>

<section class="flex-1 flex items-center justify-center py-20 bg-white dark:bg-gray-900 transition-colors duration-300 relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute top-0 right-0 -mt-32 -mr-32 w-[500px] h-[500px] bg-rose-500/5 dark:bg-rose-500/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-0 left-0 -mb-32 -ml-32 w-[400px] h-[400px] bg-rose-200/20 dark:bg-rose-800/10 rounded-full blur-[100px]"></div>

    <div class="relative z-10 text-center px-4 max-w-2xl mx-auto">
        <!-- Header spacer -->
        <div class="h-2"></div>

        <!-- Countdown Placeholder -->
        <div class="flex justify-center gap-4 md:gap-8 mb-12">
            <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 md:p-6 min-w-[80px] border border-gray-100 dark:border-gray-700">
                <span class="block text-3xl md:text-5xl font-black text-rose-600" id="days">14</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Days</span>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 md:p-6 min-w-[80px] border border-gray-100 dark:border-gray-700">
                <span class="block text-3xl md:text-5xl font-black text-rose-600" id="hours">08</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Hours</span>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 md:p-6 min-w-[80px] border border-gray-100 dark:border-gray-700">
                <span class="block text-3xl md:text-5xl font-black text-rose-600" id="minutes">32</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Minutes</span>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 md:p-6 min-w-[80px] border border-gray-100 dark:border-gray-700">
                <span class="block text-3xl md:text-5xl font-black text-rose-600 animate-pulse" id="seconds">45</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Seconds</span>
            </div>
        </div>

        <!-- Heading -->
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-gray-900 dark:text-white tracking-tighter mb-6" style="font-family: 'DM Serif Display', serif;">
            Something <span class="text-rose-600">Beautiful</span> is Coming
        </h1>

        <p class="text-gray-500 dark:text-gray-400 text-sm md:text-lg max-w-lg mx-auto mb-10 leading-relaxed">
            We're working on something special for families. Be the first to know when we launch. Sign up for updates below!
        </p>

        <!-- Newsletter -->
        <form id="coming-soon-form" class="max-w-md mx-auto" onsubmit="handleNotify(event)">
            <div class="flex gap-3">
                <input type="email" required placeholder="Enter your email" class="flex-1 px-5 py-4 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-4 rounded-xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 shadow-lg shadow-rose-600/20 btn-shine whitespace-nowrap">
                    Notify Me
                </button>
            </div>
        </form>
        <p id="notify-success" class="hidden text-sm text-green-500 mt-4 font-bold animate-pulse">🎉 You're on the list! We'll notify you when we launch.</p>

        <!-- Social -->
        <div class="mt-16 pt-8 border-t border-gray-100 dark:border-gray-800">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-4 font-bold">Follow Us</p>
            <div class="flex justify-center gap-4">
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-blue-600 hover:-translate-y-1 transition-all border border-gray-200 dark:border-gray-700"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-pink-500 hover:-translate-y-1 transition-all border border-gray-200 dark:border-gray-700"><i class="fab fa-instagram"></i></a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-sky-400 hover:-translate-y-1 transition-all border border-gray-200 dark:border-gray-700"><i class="fab fa-twitter"></i></a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-blue-700 hover:-translate-y-1 transition-all border border-gray-200 dark:border-gray-700"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
    </div>
</section>

<script src="components.js"></script>
<script>
// Countdown Timer
function startCountdown() {
    const target = new Date();
    target.setDate(target.getDate() + 14);
    
    function update() {
        const now = new Date();
        const diff = target - now;
        if (diff <= 0) return;
        
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        
        document.getElementById('days').textContent = String(d).padStart(2, '0');
        document.getElementById('hours').textContent = String(h).padStart(2, '0');
        document.getElementById('minutes').textContent = String(m).padStart(2, '0');
        document.getElementById('seconds').textContent = String(s).padStart(2, '0');
    }
    
    update();
    setInterval(update, 1000);
}

function handleNotify(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';
    setTimeout(() => {
        e.target.classList.add('hidden');
        document.getElementById('notify-success').classList.remove('hidden');
    }, 1500);
}

startCountdown();
</script>
</body>
</html>
