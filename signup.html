<!DOCTYPE html>
<html lang="en" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your TenderCare account to find trusted caregivers, browse profiles, and manage bookings for your family.">
    <title>Sign Up | TenderCare</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="tailwind-config.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 font-body min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<!-- Background -->
<div class="fixed inset-0 z-0 bg-cover bg-center filter blur-[6px] scale-105" style="background-image: url('assets/family-happy.png');"></div>
<div class="fixed inset-0 z-0 bg-gray-950/60 dark:bg-gray-950/80 transition-colors duration-500"></div>

<!-- RTL & Theme Toggles (Floating page top-right) -->
<div class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50 flex items-center gap-1.5">
    <button class="js-dir-toggle w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100/50 hover:bg-gray-100 dark:bg-gray-800/50 dark:hover:bg-gray-800 border border-gray-200/20 dark:border-gray-700/50 text-gray-800 dark:text-white transition-all text-[8px] font-black uppercase" aria-label="Toggle text direction">
        <span>LTR</span>
    </button>
    <button class="js-theme-toggle w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100/50 hover:bg-gray-100 dark:bg-gray-800/50 dark:hover:bg-gray-800 border border-gray-200/20 dark:border-gray-700/50 text-gray-800 dark:text-white transition-all" aria-label="Toggle theme">
        <i class="fas fa-moon text-[10px]"></i>
    </button>
</div>

<!-- Signup Container -->
<div class="relative z-10 w-full max-w-md my-8">
    <div class="glass relative overflow-hidden rounded-[2.5rem] p-8 md:p-10 shadow-2xl bg-white/80 dark:bg-gray-950/80 border border-rose-100/20 dark:border-gray-800/80 transition-all duration-300">
        
        <div class="flex justify-center mb-8">
            <a href="index.html" class="flex items-center space-x-2.5 group">
                <img src="assets/logo.png" alt="TenderCare Logo" class="h-8 w-8 object-contain rounded-lg shadow-sm border border-gray-150/10 dark:border-gray-800/10 transition-transform group-hover:scale-105 duration-350">
                <span class="font-black text-xl tracking-tight text-rose-700 dark:text-rose-500 group-hover:text-rose-600 dark:group-hover:text-rose-400 transition-colors" style="font-family: 'DM Serif Display', serif;">
                    TenderCare
                </span>
            </a>
        </div>

        <!-- Form -->
        <form id="signup-form" class="space-y-4" onsubmit="handleSignup(event)">
            <!-- First Name -->
            <div class="space-y-1.5">
                <label for="firstname" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">First Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-user"></i></span>
                    <input type="text" id="firstname" required placeholder="First name" class="w-full pl-11 pr-4 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                </div>
            </div>

            <!-- Last Name -->
            <div class="space-y-1.5">
                <label for="lastname" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Last Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-user"></i></span>
                    <input type="text" id="lastname" required placeholder="Last name" class="w-full pl-11 pr-4 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-1.5">
                <label for="email" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" required placeholder="your@email.com" class="w-full pl-11 pr-4 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                </div>
            </div>

            <!-- Phone -->
            <div class="space-y-1.5">
                <label for="phone" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Phone Number</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="phone" placeholder="+1 (555) 123-4567" class="w-full pl-11 pr-4 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-1.5">
                <label for="password" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-11 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                    <button type="button" onclick="togglePwd('password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-rose-600 transition-colors" aria-label="Toggle password visibility">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="space-y-1.5">
                <label for="confirm-password" class="block text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Confirm Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full pl-11 pr-11 py-3.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white placeholder-gray-400 focus:border-rose-600 focus:ring-1 focus:ring-rose-600 outline-none transition-all">
                    <button type="button" onclick="togglePwd('confirm-password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-rose-600 transition-colors" aria-label="Toggle password visibility">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="pt-2">
                <label class="flex items-start gap-2 text-gray-600 dark:text-gray-400 cursor-pointer">
                    <input type="checkbox" required class="w-4 h-4 mt-0.5 rounded border-gray-300 dark:border-gray-700 text-rose-600 focus:ring-rose-500 bg-white/50 dark:bg-gray-900/50 transition-colors">
                    <span class="text-[11px] leading-relaxed">I agree to the <a href="#" class="text-rose-600 hover:underline font-bold">Terms of Service</a> and <a href="#" class="text-rose-600 hover:underline font-bold">Privacy Policy</a></span>
                </label>
            </div>

            <!-- CTA -->
            <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 shadow-lg shadow-rose-600/20 btn-shine mt-2">
                Create Account
            </button>

            <!-- Divider -->
            <div class="relative flex items-center justify-center my-5">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-gray-800"></div></div>
                <span class="relative z-10 px-4 text-[9px] font-black uppercase tracking-widest text-gray-400 bg-white/90 dark:bg-gray-950/90 rounded-full py-0.5 border border-gray-100 dark:border-gray-800 transition-colors">Or Sign Up With</span>
            </div>

            <!-- Social Signups -->
            <div class="grid grid-cols-3 gap-3">
                <button type="button" class="flex items-center justify-center py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-white/50 dark:bg-gray-900/50 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md transition-all active:scale-95 text-gray-700 dark:text-gray-200" aria-label="Sign up with Google"><i class="fab fa-google text-base"></i></button>
                <button type="button" class="flex items-center justify-center py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-white/50 dark:bg-gray-900/50 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md transition-all active:scale-95 text-gray-700 dark:text-gray-200" aria-label="Sign up with Apple"><i class="fab fa-apple text-base"></i></button>
                <button type="button" class="flex items-center justify-center py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-white/50 dark:bg-gray-900/50 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md transition-all active:scale-95 text-gray-700 dark:text-gray-200" aria-label="Sign up with Facebook"><i class="fab fa-facebook-f text-base"></i></button>
            </div>
        </form>

        <!-- Footer -->
        <div class="mt-6 text-center text-xs border-t border-gray-100 dark:border-gray-800 pt-6">
            <span class="text-gray-500 dark:text-gray-400">Already have an account?</span>
            <a href="login.html" class="text-rose-700 dark:text-rose-500 font-black uppercase tracking-widest hover:underline ml-1">Sign In</a>
        </div>
    </div>
</div>

<script src="components.js"></script>
<script>
function togglePwd(id, btn) {
    const f = document.getElementById(id); const i = btn.querySelector('i');
    if (f.type === 'password') { f.type = 'text'; i.className = 'fas fa-eye-slash text-sm'; }
    else { f.type = 'password'; i.className = 'fas fa-eye text-sm'; }
}
function handleSignup(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> Creating Account...';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
}
</script>
</body>
</html>
